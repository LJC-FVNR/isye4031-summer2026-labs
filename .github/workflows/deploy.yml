name: Deploy JupyterLite Labs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          for req in modules/*/requirements-lite-build.txt; do
            python -m pip install -r "$req"
          done

      - name: Build all JupyterLite modules
        run: |
          mkdir -p public/modules
          cp index.html public/index.html
          touch public/.nojekyll
          for module in modules/*; do
            if [ -f "$module/jupyter_lite_config.json" ]; then
              name=$(basename "$module")
              jupyter lite build --lite-dir "$module" --output-dir "$PWD/public/modules/$name"
            fi
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

